name: Lint and Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Python (Ruff)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff (Check only, no fix)
        run: ruff check src tests --output-format=github

      # 2. JS/TS (ESLint & Prettier)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Prettier Check
        run: npx prettier --check src tests
      - name: Run ESLint
        run: npx eslint src tests

      # 3. Rust (Cargo Clippy & fmt) - Placeholder/Optional
      - name: Check Rust (if exists)
        if: hashFiles('**/Cargo.toml') != ''
        run: |
          rustup component add clippy rustfmt
          cargo fmt --check
          cargo clippy -- -D warnings

      # 4. Go (Golangci-lint) - Placeholder/Optional
      - name: Check Go (if exists)
        if: hashFiles('**/go.mod') != ''
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
